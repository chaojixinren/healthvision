services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?err}
      MYSQL_DATABASE: healthvision
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_DRIVER: mysql
      DB_DSN: root:${MYSQL_ROOT_PASSWORD:?err}@tcp(mysql:3306)/healthvision?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: ${JWT_SECRET:?err}
      JWT_ISSUER: healthvision
      ACCESS_TOKEN_TTL: 24h
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:?err}
      AGENT_REQUIRE_WRITE_TOOL_CONFIRMATION: "true"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
